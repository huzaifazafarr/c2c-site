<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2C - Campus to Corporate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo-group">
                <img src="images/logo.png" alt="C2C Logo" class="logo-img">
                <div class="logo-text">
                    <span class="brand">C2C</span>
                    <span class="tagline">Campus to Corporate</span>
                </div>
            </div>
            <nav>
                <a href="#services">Services</a>
                <a href="#pricing">Pricing</a>
                <a href="#about">About</a>
                <button class="btn-maroon">Get Started</button>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <span class="badge">🎓 Empowering Pakistani Students</span>
            <h1>Your Bridge from <br> Campus to Corporate</h1>
            <p>Professional CVs, ATS checks, and Mentorship—built for Pakistani students, priced for Pakistani pockets.</p>
            <div class="hero-actions">
                <button class="btn-white">Get Your CV Reviewed (Rs. 600)</button>
                <button class="btn-outline">Free ATS Check</button>
            </div>
            <div class="stats">
                <span><strong>2000+</strong> Students Helped</span>
                <span><strong>50+</strong> Universities</span>
                <span><strong>95%</strong> Success Rate</span>
            </div>
        </div>
        <div class="hero-image">
            <img src="images/hero.jpg" alt="IBA Campus">
        </div>
    </section>

</body>
</html>
